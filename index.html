<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css">
    <title>Homepage</title>
    <style>
        body {
            background-image: linear-gradient(#000000, #ff9933);
            min-height: 100vh;
            color: white;
            overflow: hidden; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Main Wrapper: Perfectly centered and takes full width */
        .main-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100vw;
            height: 100vh;
            opacity: 0; 
            transition: opacity 1.2s ease-in-out;
        }

        .show-wrapper {
            opacity: 1 !important;
        }

        /* Three Equal Columns */
        .col-section {
            flex: 1; /* Each takes exactly 33.33% of the page */
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            position: relative;
        }

        /* Left Column alignment */
        .links-container {
            display: flex;
            flex-direction: column;
            gap: 25px;
            text-align: right;
            padding-right: 40px; /* Gap between links and first ruler */
        }

        /* Middle Column alignment */
        .summary-container {
            text-align: center;
            padding: 0 60px;
        }

        /* Right Column alignment */
        .image-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Orange Vertical Rules */
        .vertical-rule {
            width: 4px;
            background-color: #FF9933;
            height: 70vh;
            box-shadow: 0 0 20px rgba(255, 153, 51, 0.8);
            flex-shrink: 0; /* Prevents rules from squishing */
        }

        /* Link Styling */
        .nav-link-custom {
            color: white;
            font-size: 24px;
            text-decoration: none;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            font-weight: 500;
            display: inline-block;
        }

        .nav-link-custom:hover {
            color: #FF9933;
            transform: translateX(15px);
        }

        #summaryText {
            font-size: 24px;
            font-style: italic;
            line-height: 1.6;
            transition: 0.4s ease;
            min-height: 120px;
        }

        .fade-out {
            opacity: 0;
            transform: translateY(10px);
        }

        /* --- CINEMATIC IMAGE ANIMATION --- */
        .animated-image {
            position: absolute;
            top: 50%;
            left: 50%;
            /* Start: Exactly center of screen */
            transform: translate(-50%, -50%); 
            opacity: 0; 
            transition: 
                opacity 1.5s ease, 
                transform 2s cubic-bezier(0.65, 0, 0.35, 1); 
            z-index: 100;
            pointer-events: none;
        }

        .fade-in {
            opacity: 1 !important; 
        }

        .move-right {
            /* 
               Calculation: 
               Current position is 50%. 
               Center of the right third is at 83.33% (50% + 33.33%).
               So we translate by 33.33vw.
            */
            transform: translate(calc(-50% + 33.33vw), -50%) !important; 
        }
    </style>
</head>
<body>

    <!-- Floating Image -->
    <img src="Total.png" 
         id="heroImage" 
         class="animated-image" 
         alt="Centered Image" 
         height="400px">

    <!-- Symmetric Page Layout -->
    <div class="main-wrapper" id="mainWrapper">
        
        <!-- 1. Left Section -->
        <div class="col-section">
            <div class="links-container">
                <a class="nav-link-custom" data-summary="An introductory course to understanding DSA, with references and a curriculum." href="https://ivsnetwork.github.io/DSA-1/">DSA-1</a>
                <a class="nav-link-custom" data-summary="A complete guide to quantitative finance and stock trading. " href="https://ivsnetwork.github.io/Quant/">Quant</a>
                <a class="nav-link-custom" data-summary="Market-defining developments in manufacturing using computer-aided systems and AI. " href="https://ivsnetwork.github.io/Manufacturing/">Manufacturing</a>
                <a class="nav-link-custom" data-summary="Making environmentally sustainable solutions for AI and manufacturing. " href="https://ivsnetwork.github.io/Sustenance/">Sustenance</a>
            </div>
        </div>

        <!-- Ruler 1 -->
        <div class="vertical-rule"></div>

        <!-- 2. Center Section -->
        <div class="col-section">
            <div class="summary-container">
                <div id="summaryText">Welcome to the homepage of Hanuman Group.</div>
            </div>
        </div>

        <!-- Ruler 2 -->
        <div class="vertical-rule"></div>

        <!-- 3. Right Section -->
        <div class="col-section">
            <div class="image-placeholder">
                <!-- The animated image glides into the center of this div -->
            </div>
        </div>

    </div>

    <script>
        const img = document.getElementById("heroImage");
        const wrapper = document.getElementById("mainWrapper");
        const summaryText = document.getElementById("summaryText");
        const links = document.querySelectorAll(".nav-link-custom");

        window.onload = () => {
            // 1. Fade in at the absolute center of the page
            img.classList.add("fade-in");

            // 2. Glide to the absolute center of the right column
            setTimeout(() => {
                img.classList.add("move-right");
            }, 1500);

            // 3. Fade in the rulers and layout
            setTimeout(() => {
                wrapper.classList.add("show-wrapper");
            }, 3000);
        };

        // Hover Logic
        links.forEach(link => {
            link.addEventListener("mouseenter", () => {
                summaryText.classList.add("fade-out");
                setTimeout(() => {
                    summaryText.textContent = link.getAttribute("data-summary");
                    summaryText.classList.remove("fade-out");
                }, 200);
            });

            link.addEventListener("mouseleave", () => {
                summaryText.classList.add("fade-out");
                setTimeout(() => {
                    summaryText.textContent = "Welcome to the homepage of Hanuman Group.";
                    summaryText.classList.remove("fade-out");
                }, 200);
            });
        });
    </script>
</body>
</html>
