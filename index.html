<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hanuman Group</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    background:#fffaf5;
    overflow:hidden;
    color:#222;
}

/* MAIN LAYOUT */

.container{
    width:100%;
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 8%;
}

/* LEFT SIDE */

.left{
    width:45%;
    opacity:0;
    transform:translateY(40px);
    transition:1s ease;
}

.left.show{
    opacity:1;
    transform:translateY(0);
}

.tag{
    color:#ff6b00;
    font-weight:600;
    letter-spacing:3px;
    margin-bottom:20px;
}

h1{
    font-size:72px;
    line-height:1;
    margin-bottom:20px;
}

.description{
    font-size:18px;
    line-height:1.8;
    color:#666;
    min-height:120px;
    transition:.4s;
}

.menu{
    margin-top:40px;
    display:flex;
    flex-direction:column;
    gap:15px;
}

.menu-item{
    width:fit-content;
    font-size:20px;
    cursor:pointer;
    transition:.3s;
    position:relative;
}

.menu-item:hover{
    color:#ff6b00;
    transform:translateX(10px);
}

.menu-item::after{
    content:'';
    position:absolute;
    left:0;
    bottom:-4px;
    width:0;
    height:2px;
    background:#ff6b00;
    transition:.3s;
}

.menu-item:hover::after{
    width:100%;
}

/* DIVIDER */

.divider{
    width:2px;
    height:0;
    background:#ffd7ba;
    transition:1s ease;
}

.divider.show{
    height:70%;
}

/* RIGHT SIDE */

.right{
    width:45%;
    position:relative;
    display:flex;
    justify-content:center;
    align-items:center;
}

.hero{
    width:420px;
    max-width:100%;
    border-radius:30px;
    box-shadow:
        0 25px 50px rgba(0,0,0,.08),
        0 10px 20px rgba(255,107,0,.12);
    position:absolute;
    bottom:-600px;
    left:50%;
    transform:translateX(-50%);
}

/* IMAGE ANIMATIONS */

.rise{
    animation:riseUp 1.5s ease-out forwards;
}

.move{
    animation:moveRight 1s ease-in-out forwards;
}

@keyframes riseUp{
    from{
        bottom:-600px;
        left:50%;
        transform:translateX(-50%);
    }

    to{
        bottom:50%;
        left:50%;
        transform:translate(-50%,50%);
    }
}

@keyframes moveRight{
    from{
        bottom:50%;
        left:50%;
        transform:translate(-50%,50%);
    }

    to{
        bottom:50%;
        left:72%;
        transform:translate(-50%,50%);
    }
}

/* CONTENT CHANGE */

.fade{
    animation:fade .35s ease;
}

@keyframes fade{
    from{
        opacity:0;
        transform:translateY(15px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* MOBILE */

@media(max-width:900px){

    body{
        overflow:auto;
    }

    .container{
        flex-direction:column;
        justify-content:center;
        gap:40px;
        padding:40px 20px;
        text-align:center;
    }

    .left,
    .right{
        width:100%;
    }

    h1{
        font-size:48px;
    }

    .divider{
        display:none;
    }

    .menu{
        align-items:center;
    }

    .hero{
        position:relative;
        left:auto !important;
        bottom:auto !important;
        transform:none !important;
        width:300px;
    }
}

</style>

</head>
<body>

<div class="container">

```
<div class="left" id="leftContent">

    <div class="tag">HANUMAN GROUP</div>

    <h1 id="title">
        Excellence in Education
    </h1>

    <p class="description fade" id="desc">
        Building future leaders through quality education,
        innovation and technology-driven learning.
    </p>

    <div class="menu">

        <div class="menu-item"
             data-title="About Us"
             data-desc="Hanuman Group is dedicated to empowering students through modern education, mentorship and innovation.">
            About
        </div>

        <div class="menu-item"
             data-title="Courses"
             data-desc="Explore JEE, NEET, Programming, AI, Data Science and competitive exam preparation programs.">
            Courses
        </div>

        <div class="menu-item"
             data-title="Projects"
             data-desc="Students work on real-world projects including software development, AI systems and research initiatives.">
            Projects
        </div>

        <div class="menu-item"
             data-title="Contact"
             data-desc="Reach out to our team and discover how we can help you achieve your goals.">
            Contact
        </div>

    </div>

</div>

<div class="divider" id="divider"></div>

<div class="right">

    <!-- Replace with your image -->
    <img
    src="Total.png"
    class="hero"
    id="hero">

</div>
```

</div>

<script>

const hero = document.getElementById("hero");
const left = document.getElementById("leftContent");
const divider = document.getElementById("divider");

/* Step 1: image rises */

hero.classList.add("rise");

/* Step 2: move image right */

setTimeout(()=>{
    hero.classList.add("move");
},1500);

/* Step 3: reveal everything */

setTimeout(()=>{
    left.classList.add("show");
    divider.classList.add("show");
},2500);

/* Hover content change */

const items = document.querySelectorAll(".menu-item");
const title = document.getElementById("title");
const desc = document.getElementById("desc");

items.forEach(item=>{

    item.addEventListener("mouseenter",()=>{

        title.textContent = item.dataset.title;

        desc.classList.remove("fade");
        void desc.offsetWidth;

        desc.textContent = item.dataset.desc;
        desc.classList.add("fade");

    });

});

</script>

</body>
</html>
